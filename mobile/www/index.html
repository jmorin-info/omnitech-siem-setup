<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#06080f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/m/manifest.json">
<link rel="apple-touch-icon" href="/m/icon-180.png">
<title>OMNI SOC</title>
<script src="/m/chart.min.js"></script>
<style>
  :root{--bg:#06080f;--card:#0d1424;--card2:#111a2e;--bd:#1a2540;--fg:#e6edf6;--mut:#7c8aa6;--dim:#52607d;
    --cy:#22d3ee;--red:#fb3b53;--amb:#f5a623;--grn:#34d399;--vio:#a78bfa;--blu:#3b82f6;
    --top:env(safe-area-inset-top);--bot:env(safe-area-inset-bottom)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:radial-gradient(700px 400px at 90% -5%,rgba(34,211,238,.10),transparent 60%),
      radial-gradient(600px 400px at -10% 105%,rgba(167,139,250,.08),transparent 55%),var(--bg);
    color:var(--fg);font:15px/1.5 -apple-system,'Segoe UI',Roboto,sans-serif;
    min-height:100vh;overscroll-behavior:none}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
    background-size:40px 40px;mask:radial-gradient(circle at 50% 20%,#000,transparent 95%)}
  .mono{font-family:ui-monospace,'SF Mono',Consolas,monospace}
  .hide{display:none!important}
  .svi{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;display:inline-block;vertical-align:-3px}
  nav a .ic .svi{width:23px;height:23px;vertical-align:0}

  /* LOGIN */
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;z-index:10}
  .lcard{width:100%;max-width:360px;background:linear-gradient(180deg,var(--card2),var(--card));
    border:1px solid var(--bd);border-radius:18px;padding:32px 24px;box-shadow:0 18px 50px -20px rgba(0,0,0,.7)}
  .logo{width:54px;height:54px;border-radius:14px;margin:0 auto 14px;display:grid;place-items:center;font-size:28px;
    background:radial-gradient(circle at 30% 30%,var(--cy),var(--blu));box-shadow:0 0 18px rgba(34,211,238,.28)}
  .lcard h1{font-size:22px;text-align:center;letter-spacing:.5px}
  .lcard .sub{color:var(--mut);text-align:center;font-size:12px;margin:4px 0 20px}
  input{width:100%;background:#070b15;border:1px solid var(--bd);border-radius:11px;color:var(--fg);
    padding:14px;font-size:16px;margin:7px 0;outline:none}
  input:focus{border-color:var(--cy);box-shadow:0 0 0 3px rgba(34,211,238,.12)}
  .btn{background:linear-gradient(90deg,#0ea5b7,var(--cy));color:#04121a;border:0;border-radius:11px;
    padding:14px;font-weight:700;width:100%;font-size:16px;margin-top:8px}
  .err{color:var(--red);text-align:center;font-size:12px;min-height:16px;margin-top:8px}

  /* APP SHELL */
  #app{position:relative;z-index:1;min-height:100vh;padding-top:calc(56px + var(--top));padding-bottom:calc(66px + var(--bot))}
  .appbar{position:fixed;top:0;left:0;right:0;height:calc(56px + var(--top));padding:var(--top) 16px 0;
    display:flex;align-items:center;gap:10px;background:rgba(6,8,15,.82);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--bd);z-index:5}
  .appbar .mark{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:16px;
    background:radial-gradient(circle at 30% 30%,var(--cy),var(--blu));box-shadow:0 0 10px rgba(34,211,238,.22)}
  .appbar b{font-size:16px;letter-spacing:.5px}.spacer{flex:1}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--grn);box-shadow:0 0 8px var(--grn);animation:pulse 2s infinite}
  @keyframes pulse{50%{opacity:.4}}
  .ibtn{background:#0c1525;border:1px solid var(--bd);color:var(--mut);border-radius:9px;padding:7px 10px;font-size:14px}
  .ibtn.act{color:var(--cy);border-color:var(--cy)}

  main{padding:16px}
  .page{display:none;animation:fade .3s}.page.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}}
  h3.sec{font-size:13px;color:var(--mut);font-weight:700;letter-spacing:.4px;margin:18px 2px 10px;text-transform:uppercase}
  h3.sec:first-child{margin-top:4px}

  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .kpi{background:linear-gradient(155deg,var(--card2),var(--card));border:1px solid var(--bd);border-radius:14px;
    padding:14px;position:relative;overflow:hidden}
  .kpi::after{content:"";position:absolute;right:-16px;top:-16px;width:64px;height:64px;border-radius:50%;
    background:var(--a,var(--cy));opacity:.12;filter:blur(6px)}
  .kpi .l{color:var(--mut);font-size:11px;font-weight:600}
  .kpi .v{font-size:30px;font-weight:800;color:var(--a,#fff);letter-spacing:-1px;margin-top:4px}
  .kpi .s{color:var(--dim);font-size:10px}
  .kpi.red{--a:var(--red)}.kpi.amb{--a:var(--amb)}.kpi.cy{--a:var(--cy)}.kpi.vio{--a:var(--vio)}

  .card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:14px}
  .card .ct{font-size:12px;color:var(--mut);font-weight:700;margin-bottom:10px;display:flex}
  .card .ct .t{margin-left:auto;color:var(--dim);font-weight:600}
  .chartbox{position:relative;height:180px}

  .feed{display:flex;flex-direction:column;gap:10px}
  .item{background:var(--card2);border:1px solid var(--bd);border-left:3px solid var(--sev,var(--dim));
    border-radius:11px;padding:12px 13px;cursor:pointer;transition:.12s}
  .item:active{transform:scale(.985);background:#13203a}
  .item .top{display:flex;align-items:center;gap:9px}
  .item .ttl{font-weight:700;font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item .ts{color:var(--dim);font-size:11px;white-space:nowrap}
  .item .meta{color:var(--cy);font-size:11px;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .chip{padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700;white-space:nowrap;
    background:rgba(251,59,83,.15);color:var(--red);border:1px solid rgba(251,59,83,.3)}
  .chip.h{background:rgba(245,166,35,.15);color:var(--amb);border-color:rgba(245,166,35,.3)}
  .chip.m{background:rgba(59,130,246,.15);color:var(--blu);border-color:rgba(59,130,246,.3)}
  .chip.l{background:rgba(82,96,125,.15);color:var(--mut);border-color:var(--bd)}
  .sev-critical{--sev:var(--red)}.sev-high{--sev:var(--amb)}.sev-medium{--sev:var(--blu)}.sev-low{--sev:var(--dim)}
  .empty{color:var(--dim);text-align:center;padding:40px 0}

  /* BOTTOM NAV */
  nav{position:fixed;bottom:0;left:0;right:0;height:calc(66px + var(--bot));padding-bottom:var(--bot);
    display:flex;background:rgba(8,11,20,.92);backdrop-filter:blur(12px);border-top:1px solid var(--bd);z-index:5}
  nav a{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    color:var(--dim);text-decoration:none;font-size:11px;font-weight:600}
  nav a .ic{font-size:20px}
  nav a.on{color:var(--cy)}nav a.on .ic{filter:drop-shadow(0 0 2px rgba(34,211,238,.5))}

  /* DETAIL SHEET */
  #sheet{position:fixed;inset:0;z-index:20;display:none}
  #sheet.on{display:block}
  .scrim{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(2px)}
  .sheetc{position:absolute;left:0;right:0;bottom:0;max-height:86vh;overflow-y:auto;
    background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--bd);
    border-radius:20px 20px 0 0;padding:8px 18px calc(24px + var(--bot));animation:up .28s ease}
  @keyframes up{from{transform:translateY(100%)}}
  .grip{width:40px;height:4px;background:#2a3654;border-radius:3px;margin:8px auto 14px}
  .sheetc h2{font-size:17px;margin-bottom:6px}
  .kv{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd);font-size:13px}
  .kv .k{color:var(--mut);width:96px;flex-shrink:0;font-weight:600}
  .kv .v{color:var(--fg);word-break:break-word}
  .blk{margin-top:14px}.blk .lbl{font-size:11px;color:var(--mut);font-weight:700;text-transform:uppercase;margin-bottom:5px}
  .blk.rem .lbl{color:var(--grn)}.blk .txt{font-size:13px;line-height:1.55}
  .raw{background:#070b15;border:1px solid var(--bd);border-radius:9px;padding:10px;font-size:11px;
    color:var(--mut);white-space:pre-wrap;word-break:break-word;max-height:160px;overflow:auto}
  ::-webkit-scrollbar{width:0}
  /* onglet Menace */
  .thban{display:flex;flex-direction:column;gap:12px;margin-bottom:4px}
  .thlvl{display:flex;align-items:center;gap:12px;background:linear-gradient(155deg,var(--card2),var(--card));
    border:1px solid var(--bd);border-left:4px solid var(--sev,var(--dim));border-radius:14px;padding:16px 16px}
  .thlvl .thl{color:var(--mut);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .thlvl .thv{margin-left:auto;font-size:14px;padding:5px 12px}
  .thgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .thm{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:11px 8px;text-align:center}
  .thm .tmv{font-size:24px;font-weight:800;letter-spacing:-1px;line-height:1}
  .thm .tml{color:var(--dim);font-size:9.5px;margin-top:5px;line-height:1.2}
  .risk{display:flex;flex-direction:column;gap:9px}
  .rrow{background:var(--card2);border:1px solid var(--bd);border-radius:11px;padding:11px 13px}
  .rrow .rtop{display:flex;align-items:center;gap:8px}
  .rrow .rent{font-weight:700;font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rrow .rsc{font-size:17px;font-weight:800;letter-spacing:-.5px}
  .rrow .rsub{color:var(--mut);font-size:11px;margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .gz{display:block;height:6px;border-radius:4px;background:rgba(255,255,255,.06);margin-top:9px;overflow:hidden}
  .gz .gzf{display:block;height:100%;border-radius:4px;transition:width .4s ease}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="i-home" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></symbol>
  <symbol id="i-alert" viewBox="0 0 24 24"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/></symbol>
  <symbol id="i-inc" viewBox="0 0 24 24"><path d="M12 3 21 12 12 21 3 12z"/></symbol>
  <symbol id="i-threat" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></symbol>
  <symbol id="i-bell" viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></symbol>
  <symbol id="i-check" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></symbol>
</svg>
<div id="login">
  <form class="lcard" onsubmit="login(event)">
    <div class="logo">⬢</div>
    <h1>OMNI <span style="color:var(--cy)">SOC</span></h1>
    <div class="sub" data-i18n="login_sub">Centre des opérations · accès RSSI (VPN)</div>
    <input id="u" data-i18n-ph="ph_account" placeholder="Compte AD" autocomplete="username" autocapitalize="none">
    <input id="p" type="password" data-i18n-ph="ph_password" placeholder="Mot de passe" autocomplete="current-password">
    <button class="btn" data-i18n="btn_signin">Se connecter</button>
    <div class="err" id="lerr"></div>
  </form>
</div>

<div id="app" class="hide">
  <div class="appbar">
    <div class="mark">⬢</div><b>OMNI SOC</b>
    <span class="spacer"></span>
    <span class="dot" data-i18n-t="status_op" title="opérationnel"></span>
    <button class="ibtn" id="langBtn" onclick="setLang(LANG==='fr'?'en':'fr')" data-i18n-al="lang_al" aria-label="Changer la langue"><span id="langLab">EN</span></button>
    <button class="ibtn" id="pushb" onclick="enablePush()" data-i18n-al="push_al" aria-label="Activer les notifications"><svg class="svi"><use href="#i-bell"></use></svg></button>
    <button class="ibtn" onclick="logout()">⎋</button>
  </div>

  <main>
    <section class="page on" id="p-home">
      <div class="kpis" id="kpis"></div>
      <h3 class="sec" data-i18n="sec_activity">Activité (24 h)</h3>
      <div class="card"><div class="ct"><span data-i18n="card_detperhour">Détections par heure</span><span class="t" data-i18n="tag_live">temps réel</span></div><div class="chartbox"><canvas id="cTs"></canvas></div></div>
      <h3 class="sec" data-i18n="sec_tactics">Tactiques ATT&CK (7 j)</h3>
      <div class="card"><div class="chartbox"><canvas id="cTac"></canvas></div></div>
    </section>
    <section class="page" id="p-alerts"><h3 class="sec" data-i18n="sec_alerts">Alertes récentes (24 h)</h3><div class="feed" id="alFeed"></div></section>
    <section class="page" id="p-inc"><h3 class="sec" data-i18n="sec_inc">Incidents corrélés</h3><div class="feed" id="incFeed"></div></section>
    <section class="page" id="p-threat">
      <div class="thban" id="thBanner"></div>
      <h3 class="sec" data-i18n="sec_ml">Anomalies ML (3 h)</h3><div class="risk" id="mlList"></div>
      <h3 class="sec" data-i18n="sec_ueba">Risque UEBA (24 h)</h3><div class="risk" id="uebaList"></div>
      <h3 class="sec" data-i18n="sec_topdet">Top détections (24 h)</h3><div class="feed" id="detMini"></div>
    </section>
  </main>

  <nav id="nav">
    <a class="on" data-p="home"><span class="ic"><svg class="svi"><use href="#i-home"></use></svg></span><span data-i18n="nav_home">Synthèse</span></a>
    <a data-p="alerts"><span class="ic"><svg class="svi"><use href="#i-alert"></use></svg></span><span data-i18n="nav_alerts">Alertes</span></a>
    <a data-p="inc"><span class="ic"><svg class="svi"><use href="#i-inc"></use></svg></span><span data-i18n="nav_inc">Incidents</span></a>
    <a data-p="threat"><span class="ic"><svg class="svi"><use href="#i-threat"></use></svg></span><span data-i18n="nav_threat">Menace</span></a>
  </nav>
</div>

<div id="sheet"><div class="scrim" onclick="closeSheet()"></div><div class="sheetc" id="sheetc"></div></div>

<script>
const API="/m/api",$=s=>document.querySelector(s);
const ic=n=>'<svg class="svi"><use href="#i-'+n+'"></use></svg>';
const j=(u,o)=>fetch(API+u,{credentials:"same-origin",...o}).then(r=>{if(r.status===401)throw"auth";return r.json()});
const esc=s=>(s==null?"":""+s).replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));
const nice=s=>esc((s||"").toString().replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase()));
const ago=ts=>{if(!ts)return"";let d=(Date.now()-new Date((""+ts).replace(" ","T").replace(/(Z|[+-]\d\d:?\d\d)?$/,"Z")).getTime())/1000;
  return d<60?t("ago_now"):d<3600?(d/60|0)+" min":d<86400?(d/3600|0)+" h":(d/86400|0)+" "+t("ago_day")};
const PAL=["#22d3ee","#a78bfa","#fb3b53","#f5a623","#34d399","#3b82f6","#e879f9","#2dd4bf"];
const sevClass=s=>{s=(s||"").toLowerCase();return s.includes("crit")?"critical":(s.includes("high")||s.includes("elev"))?"high":(s.includes("med")||s.includes("moy"))?"medium":"low";};
const chipCls=c=>c==="high"?"h":c==="medium"?"m":c==="low"?"l":"";
let DATA={alerts:[],incidents:[]};
// ===== i18n FR/EN (même clé localStorage que la console SOC) =====
let LANG=localStorage.getItem("soc_lang")||"fr";
const I18N={
 fr:{login_sub:"Centre des opérations · accès RSSI (VPN)",ph_account:"Compte AD",ph_password:"Mot de passe",btn_signin:"Se connecter",err_creds:"Identifiants invalides",err_net:"Erreur réseau",
  status_op:"opérationnel",push_al:"Activer les notifications",lang_al:"Changer la langue",
  sec_activity:"Activité (24 h)",card_detperhour:"Détections par heure",tag_live:"temps réel",sec_tactics:"Tactiques ATT&CK (7 j)",sec_alerts:"Alertes récentes (24 h)",sec_inc:"Incidents corrélés",sec_ml:"Anomalies ML (3 h)",sec_ueba:"Risque UEBA (24 h)",sec_topdet:"Top détections (24 h)",
  nav_home:"Synthèse",nav_alerts:"Alertes",nav_inc:"Incidents",nav_threat:"Menace",
  kpi_critinc:"Incidents critiques",kpi_7d:"7 jours",kpi_riskhosts:"Hôtes à risque",kpi_uebage:"UEBA ≥ 80",kpi_det:"Détections",kpi_24h:"24 h",kpi_kev:"CVE KEV exposées",kpi_cisa:"CISA",
  empty_inc:"Aucun incident corrélé",empty_ras:"RAS",
  k_entities:"Entités",k_attack:"ATT&CK",k_rule:"Règle",blk_analysis:"Analyse",blk_remediation:"Remédiation",k_entity:"Entité",blk_detail:"Détail",lab_priority:"Priorité",
  push_hint:"Installe l'app (Partager → Sur l'écran d'accueil) pour activer le push.",
  thr_level:"Niveau de menace",thr_critinc:"Incidents critiques · 7 j",thr_riskhosts:"Hôtes à risque · UEBA",thr_kev:"CVE KEV exposées",
  empty_anom:"Aucune anomalie",empty_det:"Aucune détection (24 h)",det_fallback:"Détection",
  k_tactic:"Tactique",k_technique:"Technique",k_source:"Source",blk_message:"Message",chip_score:"score",ago_now:"à l'instant",ago_day:"j"},
 en:{login_sub:"Operations center · CISO access (VPN)",ph_account:"AD account",ph_password:"Password",btn_signin:"Sign in",err_creds:"Invalid credentials",err_net:"Network error",
  status_op:"operational",push_al:"Enable notifications",lang_al:"Change language",
  sec_activity:"Activity (24h)",card_detperhour:"Detections per hour",tag_live:"live",sec_tactics:"ATT&CK tactics (7d)",sec_alerts:"Recent alerts (24h)",sec_inc:"Correlated incidents",sec_ml:"ML anomalies (3h)",sec_ueba:"UEBA risk (24h)",sec_topdet:"Top detections (24h)",
  nav_home:"Overview",nav_alerts:"Alerts",nav_inc:"Incidents",nav_threat:"Threat",
  kpi_critinc:"Critical incidents",kpi_7d:"7 days",kpi_riskhosts:"At-risk hosts",kpi_uebage:"UEBA ≥ 80",kpi_det:"Detections",kpi_24h:"24h",kpi_kev:"Exposed KEV CVEs",kpi_cisa:"CISA",
  empty_inc:"No correlated incidents",empty_ras:"All clear",
  k_entities:"Entities",k_attack:"ATT&CK",k_rule:"Rule",blk_analysis:"Analysis",blk_remediation:"Remediation",k_entity:"Entity",blk_detail:"Detail",lab_priority:"Priority",
  push_hint:"Install the app (Share → Add to Home Screen) to enable push.",
  thr_level:"Threat level",thr_critinc:"Critical incidents · 7d",thr_riskhosts:"At-risk hosts · UEBA",thr_kev:"Exposed KEV CVEs",
  empty_anom:"No anomaly",empty_det:"No detection (24h)",det_fallback:"Detection",
  k_tactic:"Tactic",k_technique:"Technique",k_source:"Source",blk_message:"Message",chip_score:"score",ago_now:"just now",ago_day:"d"}};
function t(k){const v=(I18N[LANG]||{})[k];return v!==undefined?v:((I18N.fr||{})[k]!==undefined?I18N.fr[k]:k);}
function applyI18n(){document.querySelectorAll("[data-i18n]").forEach(e=>e.textContent=t(e.getAttribute("data-i18n")));
  document.querySelectorAll("[data-i18n-ph]").forEach(e=>e.setAttribute("placeholder",t(e.getAttribute("data-i18n-ph"))));
  document.querySelectorAll("[data-i18n-al]").forEach(e=>e.setAttribute("aria-label",t(e.getAttribute("data-i18n-al"))));
  document.querySelectorAll("[data-i18n-t]").forEach(e=>e.setAttribute("title",t(e.getAttribute("data-i18n-t"))));}
function updateLangBtn(){const b=$("#langLab");if(b)b.textContent=(LANG==="fr"?"EN":"FR");}
function setLang(l){LANG=l;localStorage.setItem("soc_lang",l);document.documentElement.lang=l;applyI18n();updateLangBtn();
  if(!$("#app").classList.contains("hide"))loadAll();}

function login(e){e.preventDefault();
  fetch(API+"/login",{method:"POST",credentials:"same-origin",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:u.value,password:p.value})})
   .then(r=>r.ok?start():$("#lerr").textContent=t("err_creds")).catch(()=>$("#lerr").textContent=t("err_net"));}
function logout(){fetch(API+"/logout",{method:"POST",credentials:"same-origin"}).then(()=>location.reload());}
function start(){$("#login").classList.add("hide");$("#app").classList.remove("hide");applyI18n();updateLangBtn();loadAll();
  setInterval(()=>{if(!document.hidden)loadAll()},60000);}

document.querySelectorAll("#nav a").forEach(a=>a.onclick=e=>{e.preventDefault();
  document.querySelectorAll("#nav a").forEach(x=>x.classList.toggle("on",x===a));
  const p=a.dataset.p;document.querySelectorAll(".page").forEach(s=>s.classList.toggle("on",s.id==="p-"+p));});

if(window.Chart){Chart.defaults.color="#7c8aa6";Chart.defaults.font.family="Segoe UI";Chart.defaults.borderColor="rgba(255,255,255,.05)";}
const charts={};const mk=(id,cfg)=>{if(!window.Chart)return;if(charts[id])charts[id].destroy();charts[id]=new Chart($("#"+id),cfg);};

async function loadAll(){
  try{
    const [k,ts,tac,al,inc]=await Promise.all([j("/kpis"),j("/timeseries"),j("/by-tactic"),j("/alerts"),j("/incidents")]);
    DATA.alerts=al.alerts||[];DATA.incidents=inc.incidents||[];
    renderKpis(k.kpis||{});renderTs(ts.series||[]);renderTac(tac.data||[]);
    renderFeed("alFeed",DATA.alerts,"alert");renderFeed("incFeed",DATA.incidents,"inc");
    loadThreat();
  }catch(e){if(e==="auth")location.reload();}
}
function renderKpis(k){$("#kpis").innerHTML=[
  ["red",t("kpi_critinc"),k.incidents_critiques_7j,t("kpi_7d")],
  ["amb",t("kpi_riskhosts"),k.hotes_risque_ueba,t("kpi_uebage")],
  ["cy",t("kpi_det"),k.alertes_24h,t("kpi_24h")],
  ["vio",t("kpi_kev"),k.kev_exposees,t("kpi_cisa")]
].map(([c,l,v,s])=>`<div class="kpi ${c}"><div class="l">${l}</div><div class="v mono">${(v??0).toLocaleString("fr")}</div><div class="s">${s}</div></div>`).join("");}
function renderTs(s){const lab=s.map(x=>new Date(x.t).getHours()+"h"),d=s.map(x=>x.n);
  mk("cTs",{type:"line",data:{labels:lab,datasets:[{data:d,borderColor:"#22d3ee",borderWidth:2,fill:true,tension:.35,pointRadius:0,
    backgroundColor:c=>{const g=c.chart.ctx.createLinearGradient(0,0,0,180);g.addColorStop(0,"rgba(34,211,238,.35)");g.addColorStop(1,"rgba(34,211,238,0)");return g;}}]},
    options:{plugins:{legend:{display:false}},maintainAspectRatio:false,scales:{x:{grid:{display:false},ticks:{maxTicksLimit:8}},y:{beginAtZero:true,ticks:{maxTicksLimit:4}}}}});}
function renderTac(d){mk("cTac",{type:"doughnut",data:{labels:d.map(x=>nice(x.k)),datasets:[{data:d.map(x=>x.n),backgroundColor:PAL,borderColor:"#0d1424",borderWidth:2}]},
  options:{maintainAspectRatio:false,cutout:"60%",plugins:{legend:{position:"bottom",labels:{boxWidth:9,padding:9,font:{size:10}}}}}});}

function renderFeed(id,list,kind){const el=$("#"+id);
  if(!list.length){el.innerHTML='<div class="empty">'+ic('check')+' '+(kind==="inc"?t("empty_inc"):t("empty_ras"))+'</div>';return;}
  el.innerHTML=list.map((x,i)=>{
    const c=kind==="inc"?sevClass(x.severity):(x.priority==3?"critical":x.priority==2?"high":"medium");
    const badge=kind==="inc"?esc((x.severity||"?").toUpperCase()):"P"+(x.priority||"-");
    const meta=kind==="inc"?esc(((x.entities||"")+" · "+(x.mitre||"")).toString()):(x.entity?esc(x.entity):"");
    return `<div class="item sev-${c}" onclick="openSheet('${kind}',${i})"><div class="top">
      <span class="chip ${chipCls(c)}">${badge}</span><span class="ttl">${esc(x.title)}</span><span class="ts">${ago(x.ts)}</span></div>
      ${meta?`<div class="meta">${meta}</div>`:""}</div>`;}).join("");}

function openSheet(kind,i){const x=(kind==="inc"?DATA.incidents:DATA.alerts)[i];if(!x)return;
  const c=kind==="inc"?sevClass(x.severity):(x.priority==3?"critical":x.priority==2?"high":"medium");
  let h=`<div class="grip"></div><h2>${esc(x.title)}</h2>
    <div style="margin-bottom:8px"><span class="chip ${chipCls(c)}">${kind==="inc"?esc((x.severity||"?").toUpperCase()):t("lab_priority")+" "+(x.priority||"-")}</span>
    <span class="ts" style="color:var(--dim);font-size:12px;margin-left:8px">${ago(x.ts)}</span></div>`;
  if(kind==="inc"){
    if(x.entities)h+=kv(t("k_entities"),x.entities);if(x.mitre)h+=kv(t("k_attack"),x.mitre);if(x.rule)h+=kv(t("k_rule"),x.rule);
    if(x.narrative)h+=blk(t("blk_analysis"),esc(x.narrative));
    if(x.remediation)h+=blk(t("blk_remediation"),esc(x.remediation),"rem");
  }else{
    if(x.entity)h+=kv(t("k_entity"),x.entity);
    h+=`<div class="blk"><div class="lbl">${t("blk_detail")}</div><div class="raw">${esc(JSON.stringify(x,null,2))}</div></div>`;
  }
  $("#sheetc").innerHTML=h;$("#sheet").classList.add("on");}
const kv=(k,v)=>`<div class="kv"><span class="k">${k}</span><span class="v">${esc((v||"").toString())}</span></div>`;
const blk=(l,t,cl="")=>`<div class="blk ${cl}"><div class="lbl">${l}</div><div class="txt">${t}</div></div>`;
function closeSheet(){$("#sheet").classList.remove("on");}

// web-push
const b64=s=>{const p="=".repeat((4-s.length%4)%4);const b=atob((s+p).replace(/-/g,"+").replace(/_/g,"/"));return Uint8Array.from([...b].map(c=>c.charCodeAt(0)));};
async function enablePush(){try{
  if(!("serviceWorker"in navigator)||!("PushManager"in window)){alert(t("push_hint"));return;}
  if(await Notification.requestPermission()!=="granted")return;
  const reg=await navigator.serviceWorker.ready,{publicKey}=await j("/vapid");
  const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:b64(publicKey)});
  await fetch(API+"/subscribe",{method:"POST",credentials:"same-origin",headers:{"Content-Type":"application/json"},body:JSON.stringify({subscription:sub})});
  $("#pushb").classList.add("act");
}catch(e){console.log(e);}}

// ===== onglet "Menace" (parité console : niveau menace + ML/UEBA + détections sévérité) =====
let DETM=[];
function gaugeColor(v){v=+v||0;return v>=80?"var(--red)":v>=60?"var(--amb)":v>=40?"var(--cy)":"var(--dim)";}
function gaugeBar(v,max){v=+v||0;max=max||100;const pc=Math.max(4,Math.min(100,Math.round(v*100/max)));
  return '<span class="gz"><span class="gzf" style="width:'+pc+'%;background:'+gaugeColor(v)+'"></span></span>';}
function threatCls(l){l=(l||"").toUpperCase();return l.indexOf("CRIT")>=0?"critical":l.indexOf("ELEV")>=0?"high":l.indexOf("SURV")>=0?"medium":"low";}
function renderThreat(r){r=r||{};
  const c=threatCls(r.threat_level),lab=esc(r.threat_level||"NOMINAL");
  const box=$("#thBanner");
  if(box)box.innerHTML='<div class="thlvl sev-'+c+'"><div class="thl">'+t("thr_level")+'</div>'
    +'<div class="thv chip '+chipCls(c)+'">'+lab+'</div></div>'
    +'<div class="thgrid">'
    +'<div class="thm"><div class="tmv mono" style="color:var(--red)">'+((r.critical_incidents||0).toLocaleString("fr"))+'</div><div class="tml">'+t("thr_critinc")+'</div></div>'
    +'<div class="thm"><div class="tmv mono" style="color:var(--amb)">'+((r.ueba||0).toLocaleString("fr"))+'</div><div class="tml">'+t("thr_riskhosts")+'</div></div>'
    +'<div class="thm"><div class="tmv mono" style="color:var(--vio)">'+((r.kev||0).toLocaleString("fr"))+'</div><div class="tml">'+t("thr_kev")+'</div></div>'
    +'</div>';
  renderRiskList("mlList",r.ml_top||[],"ml");
  renderRiskList("uebaList",r.ueba_top||[],"ueba");
}
function renderRiskList(id,list,kind){const el=$("#"+id);if(!el)return;
  if(!list.length){el.innerHTML='<div class="empty">'+ic('check')+' '+t("empty_anom")+'</div>';return;}
  el.innerHTML=list.map(x=>{const sc=+x.score||0;
    const sub=kind==="ml"?(x.reason||x.type||""):(x.factor||"");
    return '<div class="rrow"><div class="rtop"><span class="rent">'+esc((x.entity||"—").split("\\").pop())
      +'</span><span class="rsc mono" style="color:'+gaugeColor(sc)+'">'+sc+'</span></div>'
      +gaugeBar(sc,100)
      +(sub?'<div class="rsub">'+esc(sub)+'</div>':'')+'</div>';}).join("");}
function renderDetMini(items){const el=$("#detMini");if(!el)return;
  DETM=items||[];
  if(!DETM.length){el.innerHTML='<div class="empty">'+ic('check')+' '+t("empty_det")+'</div>';return;}
  el.innerHTML=DETM.slice(0,12).map((x,i)=>{
    const c=x.sev?sevClass(x.sev):(x.priority==3?"critical":x.priority==2?"high":"medium");
    const badge=x.sev?esc((x.sev||"").toUpperCase()):"P"+(x.priority||"-");
    const ttl=esc(x.tag?nice(x.tag):(x.msg||t("det_fallback")));
    const meta=[x.entity,x.tactic?nice(x.tactic):"",x.source].filter(Boolean).map(esc).join(" · ");
    return '<div class="item sev-'+c+'" onclick="openDetSheet('+i+')"><div class="top">'
      +'<span class="chip '+chipCls(c)+'">'+badge+'</span>'
      +'<span class="ttl">'+ttl+'</span><span class="ts">'+ago(x.ts)+'</span></div>'
      +(meta?'<div class="meta">'+meta+'</div>':'')+'</div>';}).join("");}
function openDetSheet(i){const x=DETM[i];if(!x)return;
  const c=x.sev?sevClass(x.sev):(x.priority==3?"critical":x.priority==2?"high":"medium");
  const badge=x.sev?esc((x.sev||"").toUpperCase()):t("lab_priority")+" "+(x.priority||"-");
  let h='<div class="grip"></div><h2>'+esc(x.tag?nice(x.tag):t("det_fallback"))+'</h2>'
    +'<div style="margin-bottom:8px"><span class="chip '+chipCls(c)+'">'+badge+'</span>'
    +(x.score!=null?'<span class="chip l" style="margin-left:6px">'+t("chip_score")+' '+esc(""+x.score)+'</span>':'')
    +'<span class="ts" style="color:var(--dim);font-size:12px;margin-left:8px">'+ago(x.ts)+'</span></div>';
  if(x.entity)h+=kv(t("k_entity"),x.entity);
  if(x.tactic)h+=kv(t("k_tactic"),nice(x.tactic));
  if(x.tech)h+=kv(t("k_technique"),x.tech);
  if(x.source)h+=kv(t("k_source"),x.source);
  if(x.msg)h+=blk(t("blk_message"),esc(x.msg));
  $("#sheetc").innerHTML=h;$("#sheet").classList.add("on");}
async function loadThreat(){try{
  const [r,det]=await Promise.all([j("/risk"),j("/detections")]);
  renderThreat(r||{});renderDetMini((det&&det.items)||[]);
}catch(e){if(e==="auth")location.reload();}}

document.documentElement.lang=LANG;applyI18n();updateLangBtn();
if("serviceWorker"in navigator)navigator.serviceWorker.register("/m/sw.js");
j("/me").then(d=>{if(d.user)start();}).catch(()=>{});
</script>
