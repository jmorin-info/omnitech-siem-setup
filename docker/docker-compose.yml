# =============================================================================
#  OMNITECH SIEM — stack Docker (Graylog + OpenSearch + MongoDB)
#  Reproduit la plateforme bare-metal en conteneurs (versions epinglees a l'identique :
#  Graylog 7.1.3 / OpenSearch 2.19.5 / MongoDB). DEUX usages :
#    1. DR / clone : monter la stack puis RESTAURER la conf complete (mongorestore du
#       dump de 30-backup-config.sh + lookups) -> ./deploy.sh restore <archive>
#    2. From-scratch : monter la stack vide puis appliquer les scripts (cf README-DOCKER).
#  Toute la conf Graylog (streams, pipelines, 136 detections, lookups, alertes,
#  notifications) vit dans MongoDB -> un mongorestore = la plateforme entiere.
#  Secrets via .env (cf .env.example). NON destine a remplacer la prod chiffree LUKS ;
#  pour staging / reprise / demonstration / portabilite.
# =============================================================================
name: omni-siem

services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    command: ["--wiredTigerCacheSizeGB", "${MONGO_CACHE_GB:-1}"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 8s
      retries: 6
    networks: [omni]

  opensearch:
    image: opensearchproject/opensearch:2.19.5
    restart: unless-stopped
    environment:
      - cluster.name=omni-siem
      - node.name=omni-os01
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms${OS_HEAP:-2g} -Xmx${OS_HEAP:-2g}"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
      - "DISABLE_SECURITY_PLUGIN=true"          # interne au reseau docker uniquement
      - "action.auto_create_index=false"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - os_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 8s
      retries: 10
    networks: [omni]

  graylog:
    image: graylog/graylog:7.1.3
    restart: unless-stopped
    depends_on:
      mongodb: { condition: service_healthy }
      opensearch: { condition: service_healthy }
    entrypoint: ["/usr/bin/tini", "--", "wait-for-it", "opensearch:9200", "--", "/docker-entrypoint.sh"]
    environment:
      - GRAYLOG_PASSWORD_SECRET=${GRAYLOG_PASSWORD_SECRET:?definir dans .env}
      - GRAYLOG_ROOT_PASSWORD_SHA2=${GRAYLOG_ROOT_PASSWORD_SHA2:?definir dans .env (sha256 du mot de passe admin)}
      - GRAYLOG_HTTP_EXTERNAL_URI=${GRAYLOG_HTTP_EXTERNAL_URI:-http://127.0.0.1:9000/}
      - GRAYLOG_MONGODB_URI=mongodb://mongodb:27017/graylog
      - GRAYLOG_ELASTICSEARCH_HOSTS=http://opensearch:9200
      - GRAYLOG_ELASTICSEARCH_VERSION=7
      - GRAYLOG_TIMEZONE=Europe/Paris
      # --- tuning / scalabilite (aligne sur la prod : heap, buffers, journal) ---
      - "GRAYLOG_SERVER_JAVA_OPTS=-Xms${GL_HEAP:-2g} -Xmx${GL_HEAP:-2g} -server -XX:+UseG1GC"
      - GRAYLOG_PROCESSBUFFER_PROCESSORS=${GL_PROC:-4}
      - GRAYLOG_OUTPUTBUFFER_PROCESSORS=${GL_OUT:-3}
      - GRAYLOG_INPUTBUFFER_PROCESSORS=${GL_IN:-2}
      - GRAYLOG_OUTPUT_BATCH_SIZE=${GL_BATCH:-1000}
      - GRAYLOG_MESSAGE_JOURNAL_MAX_SIZE=${GL_JOURNAL:-10gb}
    ports:
      - "9000:9000"        # console web Graylog
      - "5044:5044"        # Winlogbeat / Beats (TLS : cert requis, cf ../certs)
      - "1514:1514/udp"    # syslog FortiAnalyzer
      - "1515:1515"        # syslog ESET
      - "1516:1516"        # syslog vSphere (tcp)
      - "1516:1516/udp"    # syslog vSphere (udp)
      - "1518:1518"        # syslog TLS FortiClient EMS (cert requis, cf ../certs)
      - "1519:1519"        # syslog Linux
      - "1520:1520/udp"    # syslog Aruba
      - "12201:12201"      # GELF (oms-ml / oms-xdr / robots)
    volumes:
      - graylog_data:/usr/share/graylog/data
      - graylog_journal:/usr/share/graylog/data/journal
      - ../lookups:/etc/graylog/lookup:ro          # CSV de lookup versionnes (mitre, ti, net-segments, aruba...)
      - ./geoip:/var/lib/graylog-server/geoip:ro   # bases GeoIP DB-IP (.mmdb) -> carte 3D vivante (cf docker/geoip/README)
      - ./certs:/etc/graylog/certs:ro              # certs d'inputs TLS (Beats 5044, EMS 1518) - cf docker/certs/README
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/api/system/lbstatus | grep -qi alive"]
      interval: 20s
      timeout: 8s
      retries: 15
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: "${GRAYLOG_MEM:-3g}"
    networks: [omni]

  # ---- Console SOC : backend /m/api + UI /soc + PWA /m -----------------------
  console:
    build:
      context: ..
      dockerfile: docker/Dockerfile.console
    image: omni-siem/console:latest
    restart: unless-stopped
    depends_on:
      opensearch: { condition: service_healthy }
      graylog: { condition: service_healthy }
    environment:
      - OPENSEARCH=http://opensearch:9200
      - GRAYLOG_API=http://graylog:9000/api
      - MOBILE_SECRET=${MOBILE_SECRET:?definir dans .env (secret HMAC de session console)}
      - MOBILE_PUSH_SECRET=${MOBILE_PUSH_SECRET:-}
      - MOBILE_REDACT=${MOBILE_REDACT:-0}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:soc@omnitech-security.fr}
    volumes:
      - console_data:/app/data
    networks: [omni]

  # ---- Reverse proxy TLS : /soc //m //kit + Graylog --------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      graylog: { condition: service_healthy }
      console: { condition: service_healthy }
    entrypoint: ["/docker-entrypoint-omni.sh"]
    environment:
      - SERVER_NAME=${SERVER_NAME:-omni-siem.local}
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-entrypoint.sh:/docker-entrypoint-omni.sh:ro
      - ../mobile/soc:/srv/soc:ro
      - ../mobile/www:/srv/m:ro
      - nginx_certs:/etc/nginx/certs
    networks: [omni]

  # ---- OMS-XDR : moteur de correlation/reponse (corrélation dans le DR) -------
  # Les IDs de streams (oms-xdr/config.yaml) correspondent a la prod -> exact apres
  # un RESTORE DR. Sur une base NEUVE (IaC), reajuster les IDs. Reponse en DRY-RUN.
  oms-xdr:
    build:
      context: ..
      dockerfile: docker/Dockerfile.oms-xdr
    image: omni-siem/oms-xdr:latest
    restart: unless-stopped
    depends_on:
      opensearch: { condition: service_healthy }
      graylog: { condition: service_healthy }
    environment:
      - OMS_INTERVAL=${OMS_INTERVAL:-300}
      - OMS_TEAMS_WEBHOOK=${OMS_TEAMS_WEBHOOK:-}
    deploy:
      resources:
        limits:
          memory: "${OMS_XDR_MEM:-512m}"
    networks: [omni]

volumes:
  mongo_data:
  os_data:
  graylog_data:
  graylog_journal:
  console_data:
  nginx_certs:

networks:
  omni:
    driver: bridge
