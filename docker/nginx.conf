# Reverse proxy OMNITECH (Docker) : sert /soc //m //kit et proxifie /m/api -> console,
# / -> Graylog. TLS obligatoire (la console pose des cookies Secure).
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    http2 on;
    server_name _;
    ssl_certificate     /etc/nginx/certs/omni.crt;
    ssl_certificate_key /etc/nginx/certs/omni.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    client_max_body_size 32m;
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types application/javascript text/javascript text/css application/json application/geo+json image/svg+xml;

    # Assets statiques /soc (js/css/textures/geojson) : compresses + caches (immutables)
    location ~* ^/soc/(.+\.(?:js|css|png|jpg|jpeg|geojson|woff2?))$ {
        alias /srv/soc/$1;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    # Console SOC (UI) — index non cache (change a chaque deploiement)
    location /soc/ { alias /srv/soc/; index index.html; try_files $uri $uri/ /srv/soc/index.html; }
    # PWA mobile
    location /m/ { alias /srv/m/; index index.html; try_files $uri $uri/ /srv/m/index.html; }
    # Backend console (API + push)
    location /m/api/ {
        proxy_pass http://console:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
    # Kit d'enrolement (si monte)
    location /kit/ { alias /srv/kit/; autoindex off; }
    # Graylog (console native + API)
    location / {
        proxy_pass http://graylog:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Graylog-Server-URL https://$host/;
    }
}
