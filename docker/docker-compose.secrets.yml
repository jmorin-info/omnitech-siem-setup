# Override OPTIONNEL — bascule les secrets sensibles en docker secrets (/run/secrets)
# au lieu de variables d'environnement en clair (non visibles dans `docker inspect`).
#
#   1) generer les fichiers de secrets :   ./gen-secrets.sh
#   2) dans .env, mettre des PLACEHOLDERS non vides (les `:?` du compose de base l'exigent ;
#      les wrappers ci-dessous ecrasent ces valeurs par le contenu de /run/secrets) :
#        GRAYLOG_PASSWORD_SECRET=managed-by-docker-secret
#        GRAYLOG_ROOT_PASSWORD_SHA2=managed-by-docker-secret
#        MOBILE_SECRET=managed-by-docker-secret
#   3) lancer :  docker compose -f docker-compose.yml -f docker-compose.secrets.yml up -d
#
secrets:
  graylog_password_secret:
    file: ./secrets/graylog_password_secret
  graylog_root_password_sha2:
    file: ./secrets/graylog_root_password_sha2
  mobile_secret:
    file: ./secrets/mobile_secret
  oms_teams_webhook:
    file: ./secrets/oms_teams_webhook

services:
  graylog:
    # Wrapper qui exporte les GRAYLOG_* depuis /run/secrets avant l'entrypoint d'origine.
    entrypoint: ["/graylog-secrets-entrypoint.sh"]
    volumes:
      - ./graylog-secrets-entrypoint.sh:/graylog-secrets-entrypoint.sh:ro
    secrets:
      - graylog_password_secret
      - graylog_root_password_sha2

  console:
    # L'entrypoint console lit MOBILE_SECRET depuis MOBILE_SECRET_FILE (convention _FILE).
    environment:
      - MOBILE_SECRET_FILE=/run/secrets/mobile_secret
    secrets:
      - mobile_secret

  oms-xdr:
    environment:
      - OMS_TEAMS_WEBHOOK_FILE=/run/secrets/oms_teams_webhook
    secrets:
      - oms_teams_webhook
