# =============================================================================
# 03-vpn-hardening.conf - Durcissement du portail SSLVPN (incident 12/06/2026)
# -----------------------------------------------------------------------------
# Constat SIEM (nuit 11->12/06) : >10 000 echecs d'authentification en 16 h
# depuis Internet (77.91.97.170, 87.251.64.x, 93.152.208.x...) sur des comptes
# generiques (admin, test, vpn) ET des logins AD reels (julien, nicolas,
# d.othman) -> 38 verrouillages de comptes AD dans la nuit via les binds LDAP
# du portail. Un attaquant peut donc verrouiller des comptes a distance (DoS).
# CLI FortiOS - A ADAPTER (noms d'interface, port du portail) avant application.
# =============================================================================

# --- 1. N'accepter le portail que depuis la France (geo-IP) ------------------
config firewall address
    edit "GEO-FR"
        set type geography
        set country "FR"
    next
end
config vpn ssl settings
    # seules les sources FR atteignent le portail ; si nomades hors France,
    # creer un addrgrp GEO-VPN avec les pays necessaires et le mettre ici
    set source-address "GEO-FR"
    # blocage des IP qui enchainent les echecs sur le portail
    # (5 tentatives = confort utilisateur, choix valide le 12/06 ; la geo-FR
    #  fait le gros du travail contre le spraying)
    set login-attempt-limit 5
    set login-block-time 600
end

# --- 2. Variante plus stricte : local-in policy explicite --------------------
# Si le portail ecoute par ex. en 10443 sur wan1 (verifier : show vpn ssl
# settings | grep port), n'autoriser QUE la France et jeter le reste :
