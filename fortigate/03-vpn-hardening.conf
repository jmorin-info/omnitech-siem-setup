# --- 3. Moyen terme (fortement recommande) ------------------------------------
# - MFA sur le VPN : FortiToken Mobile ou SAML vers Entra ID -> le spraying
#   devient inoperant meme avec un mot de passe valide.
# - julien / nicolas / d.othman sont des logins reels desormais CONNUS des
#   attaquants : l'alerte SIEM "Password spraying" (keyee par IP) surveille.
# - Revoir l'equilibre verrouillage AD vs exposition : tant que le portail
#   relaie les binds LDAP sans MFA, le seuil de verrouillage AD = surface de
#   DoS. Reduire l'exposition (geo + MFA) plutot que d'assouplir le seuil.
# - Si le web-mode du portail n'est pas utilise : le desactiver (tunnel only).
