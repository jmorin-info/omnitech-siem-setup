# =============================================================================
# 06-utm-fix-bdx.conf - CORRECTIF attachement UTM + passage proxy generalise
# -----------------------------------------------------------------------------
# Constat 12/06 ~10h : la chaine FortiGate->FAZ->SIEM est VALIDEE de bout en
# bout (diagnose log test recu cote SIEM en quelques secondes), mais les
# profils ne sont pas attaches (show firewall policy 441 : aucun profil).
# Cause probable : melange feature-set proxy (bloc 0 du 05) / regles encore
# en flow -> FortiOS refuse l'attachement dans un sens comme dans l'autre.
# SEQUENCE INCASSABLE en 4 phases, A COLLER DANS L'ORDRE. Idempotent.
# Si une phase affiche une erreur : STOP, copier la PREMIERE erreur a l'equipe IT.
# =============================================================================

# ===== PHASE 1 : detacher AV/Webfilter poses par le bloc E (etat mixte) ======
