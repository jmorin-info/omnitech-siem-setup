# ==============================================================================
# FortiAnalyzer - Forwarding vers le SIEM + filtre revise (a coller sur le FAZ)
# OBJECTIF : envoyer a Graylog (10.33.220.10:1514) ce qui a de la valeur SIEM
# (event, utm, anomaly, deny, >=warning) sans le firehose 'accept' verbeux.
#
# Verifier l'ID existant : get system log-forward
# ==============================================================================

config system log-forward
    edit 1
        set mode forwarding
        set fwd-server-type syslog
        set server-addr 10.33.220.10
        set server-port 1514
        set fwd-reliable enable
        set fwd-max-delay realtime

        set log-filter-status enable
        set log-filter-logic or
        config log-filter
            edit 1
                set field type
                set oper =
                set value event
            next
            edit 2
                set field type
                set oper =
                set value utm
            next
            edit 3
                set field type
                set oper =
                set value anomaly
            next
            edit 4
                set field action
                set oper =
                set value deny
            next
            edit 5
                set field level
                set oper >=
                set value warning
            next
        end
    next
end

# Option : tracer l'administration du FortiGate (trafic local-in/out)
#   ajouter un filtre :  set field subtype / set oper = / set value local
#
# Verification cote SIEM (~5 min apres) :
#   curl -s "127.0.0.1:9200/omni-fortigate_*/_search?size=0" -H 'Content-Type: application/json' \
#     -d '{"query":{"bool":{"must":[{"term":{"type":"utm"}},{"range":{"timestamp":{"gte":"now-15m"}}}]}},
#          "aggs":{"x":{"terms":{"field":"subtype"}}}}' | jq .aggregations.x.buckets
