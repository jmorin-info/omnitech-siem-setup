# =============================================================================
# 04-proxy-inspection.conf - Passage des regles firewall en inspection PROXY
# -----------------------------------------------------------------------------
# Demande du 12/06 : inspection proxy-based sur toutes les regles.
# FortiOS 7.x : l'inspection se regle PAR REGLE (set inspection-mode proxy),
# il n'existe pas d'interrupteur global. Deux manieres de faire :
#
#   A. GUI (recommande pour "toutes les regles" d'un coup) :
#      Policy & Objects > Firewall Policy
#      > ajouter la colonne "Inspection mode" (clic droit sur l'entete)
#      > selectionner les regles (Ctrl+A) > clic droit > Inspection mode
#      > Proxy-based.
#
#   B. CLI, regle par regle (lister les ID : show firewall policy) :
# =============================================================================

# --- B. Modele CLI par regle -------------------------------------------------
# config firewall policy
#     edit <ID>
#         set inspection-mode proxy
#     next
#     ...repeter pour chaque ID...
# end

# --- Profils de securite : basculer le feature-set en proxy -------------------
# Une regle en mode proxy attend des profils "feature-set proxy" (sinon le
# GUI refuse de les attacher). A faire pour chaque profil UTM utilise :
config antivirus profile
    edit "default"
        set feature-set proxy
    next
end
config webfilter profile
    edit "default"
        set feature-set proxy
    next
end
# (idem pour les profils dlp / file-filter le cas echeant ; IPS et DNS-filter
#  n'ont pas de feature-set, ils fonctionnent dans les deux modes)

# =============================================================================
# PRECAUTIONS (lues avant d'appliquer)
# =============================================================================
# 1. EXCEPTION VoIP : laisser les regles qui portent le profil VoIP/SIP en
#    flow-based. En proxy, le traitement SIP passe par l'ALG proxy et peut
#    perturber telephones/trunks. C'est LA seule famille de regles a exclure.
#
# 2. Les regles SANS profil de securite peuvent etre basculees sans effet :
#    le proxy (WAD) n'intervient que si un profil UTM est attache. Aucun
#    risque, mais aucun benefice non plus.
#
# 3. Ressources : le mode proxy bufferise (RAM/CPU plus sollicites, debit UTM
#    plus faible qu'en flow). Pour la volumetrie OMNITECH sur un FG-120G,
#    c'est largement dimensionne. Surveiller la semaine suivante :
#      get system performance status
#      diagnose sys top 5 20        (le process "wad" apparait : normal)
#    Si "conserve mode" apparait dans les logs -> revenir en flow sur les
#    regles a plus gros debit (sauvegardes, replications).
#
# 4. HTTPS : sans deep inspection, l'antivirus proxy ne voit pas le contenu
#    chiffre (seul le webfilter SNI travaille). Etape suivante logique :
#    profil ssl-ssh "deep-inspection" sur les regles user->Internet, avec un
#    certificat CA intermediaire emis par la PKI AD CS OMNITECH (deja deployee
#    sur le parc via GPO -> aucun avertissement navigateur). A planifier en
#    pilote sur un VLAN avant generalisation.
#
# 5. Verification apres bascule :
#      show full-configuration firewall policy | grep -B6 "inspection-mode proxy"
#    et cote SIEM : dashboard OMNI - SOC > Reseau (les logs UTM continuent
#    d'arriver a l'identique, le mode d'inspection ne change pas le logging).
