# ==============================================================================
# FortiGate - Activation du logging UTM (a coller en SSH sur le FortiGate)
# OBJECTIF : faire remonter virus / IPS / webfilter / DNS / app-control au SIEM.
# Sans ca, le SIEM est aveugle aux menaces reseau (constate : seul 'voip' arrive).
#
# !! SUR QUEL BOITIER ? Celui qui loggue vers le FAZ/SIEM. Vu du SIEM (12/06) :
#    - OMNITECH-BDX_FG120G  (cluster HA Bordeaux, porte le portail SSLVPN)
#    - FGFW-IV_FGT60F       (cluster HA site IV)
#    - HA-LC_FGT40F         (cluster HA site LC)
#    Verifier sur le boitier : get system status  (Hostname)
#    BX-FW02-IT-RT-S n'apparait PAS dans les logs SIEM -> ce n'est pas la cible.
#
# IMPORTANT : adapter les noms de profils ("default") aux tiens, et n'appliquer
# qu'aux policies sortantes pertinentes. Tester d'abord sur 1 policy.
# ==============================================================================

# --- 1. Profils de securite : activer leur journalisation -------------------
config antivirus profile
    edit "default"
        set av-virus-log enable
    next
end
# (av-block-log n'existe plus en FortiOS 7.x : les blocages sont logues d'office
#  des que le profil est attache a une policy -> retire du modele)

config webfilter profile
    edit "default"
        set extended-log enable
        config ftgd-wf
            set options error-allow rate-server-ip
        end
    next
end

config dnsfilter profile
    edit "default"
        set log-all-domain enable
    next
end

config application list
    edit "default"
        set extended-log enable
        set other-application-log enable
        set unknown-application-log enable
    next
end

# IPS : les signatures journalisent par defaut ; verifier que action != pass
# config ips sensor / edit "default" -> config entries -> set log enable

# --- 2. Appliquer les profils + journalisation sur les policies -------------
# !! NE PAS COLLER CE BLOC TEL QUEL : "edit" attend un NUMERO de policy.
#    (coller <ID> => "invalid unsigned integer" puis "Unknown action 0" en
#     cascade : RIEN n'est applique.)
#
# Etape A - lister les policies et reperer les ID des regles LAN -> WAN.
# (grep FortiOS = busybox : pas de -E ; l'option -f affiche le contexte de
#  config, donc l'ID de la regle au-dessus de chaque ligne matchee)
#    show firewall policy | grep -f dstintf
# ou, si peu de regles, le plus lisible :
#    show firewall policy
#
# Etape B - pour CHAQUE ID retenu, rejouer le bloc en remplacant 1 par l'ID :
config firewall policy
    edit 1
        set utm-status enable
        set av-profile "default"
        set ips-sensor "default"
        set webfilter-profile "default"
        set dnsfilter-profile "default"
        set application-list "default"
        set ssl-ssh-profile "certificate-inspection"
        set logtraffic all
    next
end
# Alternative GUI (plus confortable) : Policy & Objects > Firewall Policy >
# editer chaque regle sortante > activer les Security Profiles (AV, Web, DNS,
# App Control, IPS) + SSL Inspection "certificate-inspection" + Log Allowed
# Traffic = All Sessions.
# EXCEPTION : regles VoIP/SIP -> ne pas attacher l'AV/webfilter (cf. 04).

# --- 3. S'assurer que la journalisation memoire/disk est active -------------
config log memory setting
    set status enable
end
# (le forwarding vers le SIEM se fait via le FortiAnalyzer, cf. 02-faz-forwarding.conf)
