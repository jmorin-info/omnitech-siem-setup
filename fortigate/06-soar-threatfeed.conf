# =============================================================================
# 06-soar-threatfeed.conf - SOAR-light : External Threat Feed + policy de blocage
# -----------------------------------------------------------------------------
# Le SIEM publie les IP attaquantes (alertes VPN/spraying) sur :
#   https://bx-it-graylog-vm.omnitech.security/kit/soar/blocklist.txt
# Le FortiGate la lit comme "External Connector / IP Address" et la bloque en
# entree. Auto-expiration geree cote SIEM (TTL 24h par defaut).
#
# Pre-requis : le FortiGate doit pouvoir joindre le SIEM en HTTPS 443 (regle
# existante "Reseau ELK") et faire confiance a la Root CA OMNITECH (PKI interne,
# normalement deja le cas). Adapter l'interface WAN (ici wan1).
# =============================================================================

# --- 1. Connecteur de menace externe (poll toutes les 2 min) -----------------
config system external-resource
    edit "OMNI_SOAR_Blocklist"
        set type address
        set resource "https://bx-it-graylog-vm.omnitech.security/kit/soar/blocklist.txt"
        set refresh-rate 2
        set status enable
    next
end
# Verifier le chargement : diagnose sys external-resource list
#                          diagnose test application httpsd ... (ou GUI)

# !! L'interface WAN ne s'appelle PAS "wan1" sur ce boitier. D'apres la conf,
#    la zone WAN est "virtual-wan-link" (SD-WAN). Identifier au besoin :
#       show system sdwan | grep -A3 "config members"   (membres physiques)
#       get system interface physical                    (liste des interfaces)

# --- 2a. LOCAL-IN policy : bloque le trafic A DESTINATION du boitier ----------
# C'EST L'ESSENTIEL pour le spraying VPN (le portail SSLVPN ecoute SUR le FGT,
# donc une firewall policy "forward" ne le filtre pas). FortiOS 7.4 accepte un
# threat feed comme srcaddr en local-in.
config firewall local-in-policy
    edit 0
        set intf "virtual-wan-link"
        set srcaddr "OMNI_SOAR_Blocklist"
        set dstaddr "all"
        set service "ALL"
        set action deny
        set schedule "always"
    next
end
# (si "virtual-wan-link" est refuse en local-in, mettre le nom de l'interface
#  WAN physique membre, ex "port1"/"wan"/le nom reel vu plus haut)

# --- 2b. FORWARD policy : bloque le trafic TRAVERSANT (services publies) ------
# Complementaire : protege aussi les VIP/reverse-proxy exposes. A placer EN TETE.
config firewall policy
    edit 0
        set name "[P0][SEC]_SOAR_Block_Inbound"
        set srcintf "virtual-wan-link"
        set dstintf "any"
        set srcaddr "OMNI_SOAR_Blocklist"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set comments "SOAR - blocage auto IP attaquantes (feed SIEM). ISO27001 A.8.16"
    next
end
# Puis la remonter en tete : show firewall policy | grep -B1 "edit"  (noter l'ID)
#                            config firewall policy / move <ID> before <1ere_regle_WAN>

# --- Verification ------------------------------------------------------------
# - cote SIEM : curl -s https://bx-it-graylog-vm.omnitech.security/kit/soar/blocklist.txt
# - cote FGT  : diagnose sys external-resource entry-list OMNI_SOAR_Blocklist
# - test : declencher un spraying VPN -> l'IP apparait dans le feed sous ~1 min
#          + alerte SIEM "OMNI - SOAR : IP bloquee automatiquement", puis le
#          FGT la bloque au prochain poll (<=2 min).
