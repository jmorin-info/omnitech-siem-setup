# =============================================================================
# EXCEPTIONS VOLONTAIRES (ne PAS attacher d'UTM)
# =============================================================================
# - 10   Teams/Skype (Microsoft recommande le bypass d'inspection sur les
#        endpoints "Optimize" : latence audio/video)
# - 1259 1260 1316 + toutes regles VOIP : pas d'AV/webfilter (ALG SIP)
# - 1300 388 640 : flux FortiGuard/FMG/FAZ (infra Fortinet)
# - 1400-1420 : OpenVAS (scanner de vulnerabilites - l'inspecter fausse et
#        ralentit les scans)
# - 1335-1340, 472, 473, 425, 1424, 374, 376, 378 : flux logs vers le SIEM
#
# MENAGE RECOMMANDE :
# - edit 469 "TEST" : regle morte (dstaddr "all" + dstaddr-negate = ne matche
#   rien). A SUPPRIMER : config firewall policy / delete 469 / end
#
# VERIFICATION (10 min apres application) :
# - FortiGate : diagnose sys top 5 10        (wad visible = normal)
# - SIEM : dashboard OMNI - SOC > Reseau -> les KPI "UTM (virus/IPS)" et les
#   logs webfilter/dns doivent commencer a se remplir.
# =============================================================================
