# =============================================================================
# 05-utm-policies-bdx.conf - Attachement des profils UTM aux policies (BDX)
# -----------------------------------------------------------------------------
# Genere le 12/06/2026 a partir du "show firewall policy" REEL du boitier
#   Serial FG120GTK23000193 - hostname BX-FW02-IT-RT-S - HA a-p PRIMARY
#   (= le device que le FAZ/SIEM connait sous le nom OMNITECH-BDX_FG120G ;
#    le FAZ forwarde avec son nom d'enregistrement, pas le hostname actuel)
# PRET A COLLER bloc par bloc. Les ID sont ceux de TES regles.
# =============================================================================

# --- 0. Pre-requis : profils en feature-set proxy ----------------------------
# (necessaire car beaucoup de tes regles sont deja "inspection-mode proxy")
config antivirus profile
    edit "default"
        set feature-set proxy
    next
end
config webfilter profile
    edit "default"
        set feature-set proxy
    next
end

# --- A. Navigation UTILISATEURS + WiFi visiteurs : pile complete -------------
# 441  ZONE_USER -> Internet (HTTP/HTTPS, cert-inspection deja en place)
# 1261 ZONE_USER -> Internet (catch-all services)
# 1256 WiFi Visiteurs -> Internet
config firewall policy
    edit 441
        set utm-status enable
        set av-profile "default"
        set webfilter-profile "default"
        set dnsfilter-profile "default"
        set application-list "default"
        set ips-sensor "default"
        set ssl-ssh-profile "certificate-inspection"
    next
    edit 1261
        set utm-status enable
        set av-profile "default"
        set webfilter-profile "default"
        set dnsfilter-profile "default"
        set application-list "default"
        set ips-sensor "default"
        set ssl-ssh-profile "certificate-inspection"
    next
    edit 1256
        set utm-status enable
        set av-profile "default"
        set webfilter-profile "default"
        set dnsfilter-profile "default"
        set application-list "default"
        set ips-sensor "default"
        set ssl-ssh-profile "certificate-inspection"
    next
end

# --- B. Flux ENTRANTS exposes : IPS + AV --------------------------------------
# 87  Internet -> VIP reverse proxy (HTTP/HTTPS publies)
# 925 Internet -> VIP INEO NVR (serveur video expose !)
config firewall policy
    edit 87
        set utm-status enable
        set av-profile "default"
        set ips-sensor "default"
        set ssl-ssh-profile "certificate-inspection"
    next
    edit 925
        set utm-status enable
        set av-profile "default"
        set ips-sensor "default"
    next
end

# --- C. IoT / controle d'acces -> Internet : pile complete ---------------------
# 217 CTRL_ACCES -> Internet ALL (cameras/lecteurs qui "telephonent maison")
config firewall policy
    edit 217
        set utm-status enable
        set av-profile "default"
        set webfilter-profile "default"
        set dnsfilter-profile "default"
        set application-list "default"
        set ips-sensor "default"
        set ssl-ssh-profile "certificate-inspection"
    next
end

